<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdaFace WebGPU</title>
    <script type="module">
        import ADAFACE from "./net.js";
        window.ADAFACE = ADAFACE;
    </script>
    <style>
        body {
            margin: 0;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            overflow: hidden;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #video, #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scaleX(-1);
            max-width: 100vw;
            max-height: 100vh;
        }
        #overlay { pointer-events: none; }
        #outputContainer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid lime;
            color: lime;
            font-family: monospace;
            padding: 10px;
            font-size: 14px;
            z-index: 5;
        }
        #setupUI {
            position: absolute;
            z-index: 100;
            background: #111;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .controls { display: flex; gap: 10px; margin-bottom: 5px; align-items: center;}
        #cropCanvas {
            border: 2px solid #444;
            cursor: crosshair;
            background: #000;
            max-width: 90vw;
            max-height: 70vh;
        }
        button {
            padding: 10px 18px;
            background: #333;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover { background: #444; }
        #snapBtn { background: #552200; border-color: #aa4400; }
        #setEmbBtn { background: #004400; border-color: lime; color: lime; font-weight: bold; }
        #setEmbBtn:disabled { opacity: 0.3; cursor: not-allowed; }
        input[type="file"] { font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div id="setupUI">
    <h2 style="margin:0">AdaFace tinygrad</h2>
    <canvas id="cropCanvas"></canvas>
    <div class="controls">
        <button id="snapBtn">Capture Live Photo</button>
        <span style="color:#666">or</span>
        <input type="file" id="fileInput" accept="image/*">
    </div>
    <p id="cropInst" style="display:none; font-size: 12px; color: #0f0;">Drag a <b>square</b> box over the face to crop</p>
    <button id="setEmbBtn" disabled>Use photo</button>
</div>

<video id="video" autoplay muted playsinline></video>
<canvas id="overlay"></canvas>

<div id="outputContainer">
    <div id="output"></div>
</div>

<script>
const INPUT_SIZE = 112;
let net = null;
let dynamicEmb = null;
let setupStream = null;
let isDragging = false;
let isUsingLiveFeed = true;
let uploadedImg = new Image();
let cropRect = { x: 0, y: 0, w: 0, h: 0 };

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const overlayCtx = overlay.getContext('2d');
const outputEl = document.getElementById('output');
const setupUI = document.getElementById('setupUI');
const cropCanvas = document.getElementById('cropCanvas');
const ctxCrop = cropCanvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const setEmbBtn = document.getElementById('setEmbBtn');
const snapBtn = document.getElementById('snapBtn');

const offscreenCanvas = document.createElement('canvas');
offscreenCanvas.width = INPUT_SIZE;
offscreenCanvas.height = INPUT_SIZE;
const offscreenCtx = offscreenCanvas.getContext('2d');

// --- 1. INITIALIZATION ---

window.onload = async () => {
    try {
        setupStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = setupStream;
        outputEl.textContent = "Camera Ready. Select face area.";
        startPreviewLoop();
    } catch (e) {
        outputEl.textContent = "Error: Camera access denied.";
        alert("Please allow camera access to use this tool.");
    }
};

function startPreviewLoop() {
    const preview = () => {
        if (!isUsingLiveFeed) return; // Stop drawing camera if user switched to file/snap
        if (video.videoWidth > 0) {
            cropCanvas.width = video.videoWidth;
            cropCanvas.height = video.videoHeight;
            ctxCrop.save();
            ctxCrop.scale(-1, 1); // Mirror mode
            ctxCrop.drawImage(video, -cropCanvas.width, 0);
            ctxCrop.restore();
        }
        requestAnimationFrame(preview);
    };
    preview();
}

// --- 2. CAPTURE / UPLOAD LOGIC ---

snapBtn.onclick = () => {
    document.getElementById('cropInst').style.display = 'block';
    isUsingLiveFeed = false;
    uploadedImg.src = cropCanvas.toDataURL('image/jpeg');
    uploadedImg.onload = () => {
        ctxCrop.drawImage(uploadedImg, 0, 0);
        snapBtn.textContent = "Retake Photo";
        snapBtn.onclick = () => {
            isUsingLiveFeed = !isUsingLiveFeed;
            if (!isUsingLiveFeed) {
                uploadedImg.src = cropCanvas.toDataURL('image/jpeg');
                uploadedImg.onload = () => ctxCrop.drawImage(uploadedImg, 0, 0);
                snapBtn.textContent = "Retake Photo";
                document.getElementById('cropInst').style.display = 'block';
            } else {
                snapBtn.textContent = "Capture Live Photo";
                document.getElementById('cropInst').style.display = 'none';
                startPreviewLoop();
            }
        };
    };
};

fileInput.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    isUsingLiveFeed = false;
    document.getElementById('cropInst').style.display = 'block'; // Show instructions
    snapBtn.textContent = "Retake Photo"; // Sync button state
    const reader = new FileReader();
    reader.onload = event => {
        uploadedImg.onload = () => {
            cropCanvas.width = uploadedImg.width;
            cropCanvas.height = uploadedImg.height;
            ctxCrop.drawImage(uploadedImg, 0, 0);
        };
        uploadedImg.src = event.target.result;
    };
    reader.readAsDataURL(file);
};

// --- 3. SQUARE CROP LOGIC ---

cropCanvas.onmousedown = e => {
    if (isUsingLiveFeed) return; // Require a "frozen" image to crop
    const rect = cropCanvas.getBoundingClientRect();
    cropRect.x = (e.clientX - rect.left) * (cropCanvas.width / rect.width);
    cropRect.y = (e.clientY - rect.top) * (cropCanvas.height / rect.height);
    isDragging = true;
};

cropCanvas.onmousemove = e => {
    if (!isDragging) return;
    const rect = cropCanvas.getBoundingClientRect();
    const curX = (e.clientX - rect.left) * (cropCanvas.width / rect.width);
    const curY = (e.clientY - rect.top) * (cropCanvas.height / rect.height);

    let side = Math.max(Math.abs(curX - cropRect.x), Math.abs(curY - cropRect.y));
    cropRect.w = (curX < cropRect.x) ? -side : side;
    cropRect.h = (curY < cropRect.y) ? -side : side;

    ctxCrop.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
    ctxCrop.drawImage(uploadedImg, 0, 0);
    ctxCrop.strokeStyle = 'cyan';
    ctxCrop.lineWidth = 3;
    ctxCrop.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
};

cropCanvas.onmouseup = () => { 
    isDragging = false; 
    if (Math.abs(cropRect.w) > 10) setEmbBtn.disabled = false;
};

setEmbBtn.onclick = async () => {
    setEmbBtn.textContent = "Loading...";
    setEmbBtn.disabled = true;

    const realX = cropRect.w < 0 ? cropRect.x + cropRect.w : cropRect.x;
    const realY = cropRect.h < 0 ? cropRect.y + cropRect.h : cropRect.y;
    const side = Math.abs(cropRect.w);

    offscreenCtx.drawImage(uploadedImg, realX, realY, side, side, 0, 0, INPUT_SIZE, INPUT_SIZE);
    
    const device = await getDevice();
    net = await ADAFACE.load(device, "https://huggingface.co/roryclear/AdaFace/resolve/main/adaface_ir50_ms1mv2.safetensors");
    
    const input = getInputTensor(offscreenCtx);
    const out = await net(input);
    dynamicEmb = out[0];

    // Kill the setup stream and switch to inference stream
    if(setupStream) setupStream.getTracks().forEach(t => t.stop());
    setupUI.style.display = 'none';
    
    const runStream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = runStream;
    requestAnimationFrame(processFrame);
};

async function processFrame() {
    if (video.videoWidth === 0) return requestAnimationFrame(processFrame);

    overlay.width = video.clientWidth;
    overlay.height = video.clientHeight;
    overlayCtx.clearRect(0, 0, overlay.width, overlay.height);

    const squareSize = Math.min(overlay.width, overlay.height) * 0.5;
    const squareX = (overlay.width - squareSize) / 2;
    const squareY = (overlay.height - squareSize) / 2;
    overlayCtx.strokeStyle = 'cyan';
    overlayCtx.strokeRect(squareX, squareY, squareSize, squareSize);

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const cropSize = Math.min(vw, vh) * 0.5;
    const sx = (vw - cropSize) / 2;
    const sy = (vh - cropSize) / 2;

    offscreenCtx.drawImage(video, sx, sy, cropSize, cropSize, 0, 0, INPUT_SIZE, INPUT_SIZE);

    const input = getInputTensor(offscreenCtx);
    const out = await net(input);
    
    let sim = 0;
    for (let i = 0; i < dynamicEmb.length; i++) sim += dynamicEmb[i] * out[0][i];

    outputEl.textContent = `Similarity: ${Math.round(sim.toFixed(4) * 100)}%`;
    outputEl.style.color = sim > 0.4 ? 'lime' : '#ff4444';

    requestAnimationFrame(processFrame);
}

function getInputTensor(ctx) {
    const imgData = ctx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
    const pixels = imgData.data;
    const input = new Float32Array(INPUT_SIZE * INPUT_SIZE * 3);
    let j = 0;
    for (let i = 0; i < pixels.length; i += 4) {
        input[j++] = pixels[i + 2]; // B
        input[j++] = pixels[i + 1]; // G
        input[j++] = pixels[i];     // R
    }
    return input;
}

async function getDevice() {
    const adapter = await navigator.gpu.requestAdapter();
    return await adapter.requestDevice();
}
</script>
</body>
</html>
