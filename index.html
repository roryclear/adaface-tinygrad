<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal RFDETR WebGPU</title>

    <script type="module">
        import RFDETR from "./net.js";
        window.RFDETR = RFDETR;
    </script>

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        video {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>

<script>
const INPUT_SIZE = 112;

let net = null;

const video = document.getElementById('video');

// Offscreen canvas for processing
const offscreenCanvas = document.createElement('canvas');
offscreenCanvas.width = INPUT_SIZE;
offscreenCanvas.height = INPUT_SIZE;
const offscreenContext = offscreenCanvas.getContext('2d');

// CAMERA SETUP
if (navigator.mediaDevices?.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Camera error:", err);
        });
}

// MAIN LOOP
async function processFrame() {
    if (video.videoWidth === 0 || video.videoHeight === 0) {
        requestAnimationFrame(processFrame);
        return;
    }

    const vw = video.videoWidth;
    const vh = video.videoHeight;

    // Center crop square
    const cropSize = Math.min(vw, vh);
    const sx = (vw - cropSize) / 2;
    const sy = (vh - cropSize) / 2;

    // Draw cropped area into 112x112
    offscreenContext.drawImage(
        video,
        sx, sy, cropSize, cropSize,
        0, 0, INPUT_SIZE, INPUT_SIZE
    );

    const input = getInputTensor(offscreenContext);
    const output = await runModel(input);

    console.log(output);

    requestAnimationFrame(processFrame);
}

requestAnimationFrame(processFrame);

// MODEL
async function runModel(input) {
    if (!net) {
        const device = await getDevice();
        net = await RFDETR.load(
            device,
            "https://huggingface.co/roryclear/AdaFace/resolve/main/adaface_ir50_ms1mv2.safetensors"
        );
    }

    return await net(input);
}

// IMAGE → FLOAT32 TENSOR
function getInputTensor(ctx) {
    const imgData = ctx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
    const pixels = imgData.data;

    const input = new Float32Array(INPUT_SIZE * INPUT_SIZE * 3);

    let j = 0;
    for (let i = 0; i < pixels.length; i += 4) {
        input[j++] = pixels[i + 2]; // B
        input[j++] = pixels[i + 1]; // G
        input[j++] = pixels[i];     // R
    }

    return input;
}

// WEBGPU
async function getDevice() {
    if (!navigator.gpu) {
        console.error("WebGPU not supported");
        return null;
    }

    const adapter = await navigator.gpu.requestAdapter();
    return await adapter.requestDevice();
}
</script>

</body>
</html>
