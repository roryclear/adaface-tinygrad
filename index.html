<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdaFace WebGPU</title>
    <script type="module">
        import ADAFACE from "./net.js";
        window.ADAFACE = ADAFACE;
    </script>
    <style>
        body {
            margin: 0;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
            height: 100vh;
            position: relative;
            overflow: hidden;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #video, #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scaleX(-1);
            max-width: 100vw;
            max-height: 100vh;
        }
        #overlay { pointer-events: none; }
        #outputContainer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid lime;
            color: lime;
            font-family: monospace;
            padding: 10px;
            font-size: 14px;
            z-index: 5;
            max-height: 300px;
            overflow-y: auto;
            min-width: 220px;
        }
        .face-thumb {
            display: inline-block;
            margin: 4px;
            text-align: center;
            vertical-align: top;
            background: #1a1a1a;
            padding: 4px;
            border-radius: 4px;
            border: 1px solid #333;
        }
        .face-thumb canvas {
            display: block;
            margin-bottom: 2px;
            border: 1px solid #555;
        }
        .face-thumb span {
            font-size: 10px;
            color: #ccc;
        }
        .face-thumb .remove-btn {
            background: #660000;
            border: none;
            color: white;
            font-size: 9px;
            padding: 1px 4px;
            margin-top: 2px;
            cursor: pointer;
            border-radius: 2px;
            display: block;
            width: 100%;
        }
        #setupUI {
            position: absolute;
            z-index: 100;
            background: #111;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding-top: 10px;
        }
        .controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        #cropCanvas {
            border: 2px solid #444;
            cursor: crosshair;
            background: #000;
            max-width: 90vw;
            max-height: 60vh;
            touch-action: none;
        }
        button {
            padding: 6px 10px;
            font-size: 12px;
            background: #333;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover { background: #444; }
        #snapBtn { background: #552200; border-color: #aa4400; }
        #setEmbBtn {
            background: #004400;
            border-color: lime;
            color: lime;
            font-weight: bold;
        }
        #setEmbBtn:disabled { opacity: 0.3; cursor: not-allowed; }
        input[type="file"] {
            font-size: 11px;
            color: #888;
            max-width: 120px;
        }
        #multiStatus {
            font-size: 11px;
            color: #0f0;
            margin: 5px 0;
            text-align: center;
        }
        .face-list {
            margin-top: 8px;
            border-top: 1px solid #333;
            padding-top: 5px;
        }
        .current-sim {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="setupUI">
    <h3 style="margin:4px 0;">AdaFace tinygrad</h3>

    <canvas id="cropCanvas"></canvas>

    <div class="controls">
        <button id="snapBtn">Capture</button>
        <input type="file" id="fileInput" accept="image/*" multiple>
        <button id="setEmbBtn" disabled>Add Face</button>
        <button id="clearBtn" style="background:#331100;">Clear All</button>
    </div>

    <p id="cropInst" style="display:none; font-size: 11px; color: #0f0;">
        Drag square over face, then click "Add Face"
    </p>
    <div id="multiStatus">Upload multiple images, crop each face → add to gallery</div>
</div>

<video id="video" autoplay muted playsinline></video>
<canvas id="overlay"></canvas>

<div id="outputContainer">
    <canvas id="thumb" width="60" height="60"
    style="display:block;margin-bottom:6px;border:1px solid lime;"></canvas>
    <div id="output"></div>
    <div class="face-list">
        <div style="font-size:10px; margin-bottom:4px;">Faces (<span id="faceCount">0</span>)</div>
        <div id="faceGallery" style="max-height:180px; overflow-y:auto;"></div>
    </div>
</div>

<script>
let modelLoadingPromise = null;
const INPUT_SIZE = 112;
let net = null;
let embeddings = [];
let setupStream = null;
let isDragging = false;
let isUsingLiveFeed = false;
let uploadedImg = new Image();
let cropRect = { x: 0, y: 0, w: 0, h: 0 };
let currentUploadedFileIndex = -1;
let pendingFiles = [];
let isLoadingModel = false;

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const overlayCtx = overlay.getContext('2d');
const outputEl = document.getElementById('output');
const setupUI = document.getElementById('setupUI');
const cropCanvas = document.getElementById('cropCanvas');
const ctxCrop = cropCanvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const setEmbBtn = document.getElementById('setEmbBtn');
const snapBtn = document.getElementById('snapBtn');
const clearBtn = document.getElementById('clearBtn');
const countSpan = document.getElementById('faceCount');
const faceGalleryDiv = document.getElementById('faceGallery');
const multiStatus = document.getElementById('multiStatus');

const offscreenCanvas = document.createElement('canvas');
offscreenCanvas.width = INPUT_SIZE;
offscreenCanvas.height = INPUT_SIZE;
const offscreenCtx = offscreenCanvas.getContext('2d');
const thumbCtx = document.getElementById('thumb').getContext('2d');

// --- INIT camera but keep UI visible for multi upload ---
window.onload = async () => {
    try {
        setupStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = setupStream;
        outputEl.textContent = "Ready. Upload images or capture.";
        startPreviewLoop();
        isUsingLiveFeed = false;
        document.getElementById('cropInst').style.display = 'block';
        multiStatus.innerText = "Upload multiple images, drag square on each face → 'Add Face'";
        
        // Load model on launch
        loadModelOnLaunch();
    } catch (e) {
        outputEl.textContent = "Error: Camera access denied.";
        alert("Please allow camera access.");
    }
};

function loadModelOnLaunch() {
    if (modelLoadingPromise) return modelLoadingPromise;
    
    modelLoadingPromise = (async () => {
        multiStatus.innerText = "Loading model... 0%";
        const url = "https://huggingface.co/roryclear/AdaFace/resolve/main/adaface_ir50_ms1mv2.safetensors";
        try {
            const res = await fetch(url);
            const contentLength = res.headers.get("Content-Length");
            const total = contentLength ? parseInt(contentLength, 10) : 0;
            const reader = res.body.getReader();
            let received = 0;
            const chunks = [];
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                received += value.length;
                if (total) {
                    const percent = Math.round((received / total) * 100);
                    multiStatus.innerText = `Loading model... ${percent}%`;
                    setEmbBtn.textContent = `Loading ${percent}%`;
                } else {
                    const kb = Math.round(received / 1024);
                    multiStatus.innerText = `Loading model... ${kb} KB`;
                    setEmbBtn.textContent = `Loading ${kb} KB`;
                }
            }
            const blob = new Blob(chunks);
            const blobUrl = URL.createObjectURL(blob);
            const device = await getDevice();
            net = await ADAFACE.load(device, blobUrl);
            URL.revokeObjectURL(blobUrl);
            multiStatus.innerText = "Model loaded! Ready to enroll faces.";
            setEmbBtn.textContent = "Add Face";
        } catch(err) {
            console.error(err);
            multiStatus.innerText = "Model load failed: " + err;
            setEmbBtn.textContent = "Add Face";
            throw err;
        }
    })();
    
    return modelLoadingPromise;
}

function startPreviewLoop() {
    const preview = () => {
        // only show camera preview if we are not in cropping mode? Actually keep camera feed on cropCanvas when no upload
        if (video.videoWidth > 0 && !isUsingLiveFeed && !uploadedImg.src) {
            // If no uploaded image shown, show camera feed in cropCanvas (for convenience)
            cropCanvas.width = video.videoWidth;
            cropCanvas.height = video.videoHeight;
            ctxCrop.save();
            ctxCrop.scale(-1, 1);
            ctxCrop.drawImage(video, -cropCanvas.width, 0);
            ctxCrop.restore();
        } else if (uploadedImg.src && !isUsingLiveFeed) {
            // keep uploaded image displayed
        }
        requestAnimationFrame(preview);
    };
    preview();
}

// --- MULTI FILE HANDLING ---
fileInput.onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (files.length === 0) return;
    pendingFiles = files;
    currentUploadedFileIndex = 0;
    isUsingLiveFeed = false;
    document.getElementById('cropInst').style.display = 'block';
    multiStatus.innerText = `Loaded ${files.length} images. Crop face on each and click 'Add Face'.`;
    loadNextFileForCrop();
};

function loadNextFileForCrop() {
    if (currentUploadedFileIndex >= pendingFiles.length) {
        multiStatus.innerText = `All ${pendingFiles.length} images processed. You can upload more or start recognition.`;
        setEmbBtn.disabled = true;
        cropRect = { x: 0, y: 0, w: 0, h: 0 };
        ctxCrop.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
        if (pendingFiles.length > 0) {
            multiStatus.innerText += " Click 'Clear All' to reset gallery.";
        }
        return;
    }
    const file = pendingFiles[currentUploadedFileIndex];
    const reader = new FileReader();
    reader.onload = (event) => {
        uploadedImg.onload = () => {
            cropCanvas.width = uploadedImg.width;
            cropCanvas.height = uploadedImg.height;
            ctxCrop.drawImage(uploadedImg, 0, 0);
            cropRect = { x: 0, y: 0, w: 0, h: 0 };
            setEmbBtn.disabled = true;
            multiStatus.innerText = `Image ${currentUploadedFileIndex+1}/${pendingFiles.length}: Draw square around face, then click 'Add Face'`;
        };
        uploadedImg.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

// --- SNAP (capture from camera) also adds to queue: capture as new image ---
snapBtn.onclick = () => {
    if (!video.videoWidth) return;
    const captureCanvas = document.createElement('canvas');
    captureCanvas.width = video.videoWidth;
    captureCanvas.height = video.videoHeight;
    const capCtx = captureCanvas.getContext('2d');
    capCtx.save();
    capCtx.scale(-1, 1);
    capCtx.drawImage(video, -captureCanvas.width, 0);
    capCtx.restore();
    captureCanvas.toBlob(blob => {
        const capturedFile = new File([blob], `snap_${Date.now()}.jpg`, { type: 'image/jpeg' });
        if (currentUploadedFileIndex >= 0 && currentUploadedFileIndex < pendingFiles.length) {
            pendingFiles.splice(currentUploadedFileIndex + 1, 0, capturedFile);
            multiStatus.innerText = `Snapshot added. ${pendingFiles.length} total images. Click 'Add Face' after cropping.`;
        } else {
            pendingFiles.push(capturedFile);
            if (currentUploadedFileIndex === -1 || currentUploadedFileIndex >= pendingFiles.length - 1) {
                currentUploadedFileIndex = pendingFiles.length - 1;
                loadFileByIndex(currentUploadedFileIndex);
            }
            multiStatus.innerText = `Snapshot added. Total ${pendingFiles.length} images.`;
        }
        fileInput.value = '';
    }, 'image/jpeg');
};

function loadFileByIndex(index) {
    if (index >= pendingFiles.length) return;
    const file = pendingFiles[index];
    const reader = new FileReader();
    reader.onload = (event) => {
        uploadedImg.onload = () => {
            cropCanvas.width = uploadedImg.width;
            cropCanvas.height = uploadedImg.height;
            ctxCrop.drawImage(uploadedImg, 0, 0);
            cropRect = { x: 0, y: 0, w: 0, h: 0 };
            setEmbBtn.disabled = true;
            multiStatus.innerText = `Image ${index+1}/${pendingFiles.length}: Drag square, then Add.`;
        };
        uploadedImg.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

// --- CROP INTERACTION ---
function getCanvasCoords(e) {
    const rect = cropCanvas.getBoundingClientRect();
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;

    return {
        x: (clientX - rect.left) * (cropCanvas.width / rect.width),
        y: (clientY - rect.top) * (cropCanvas.height / rect.height)
    };
}

function startCrop(e) {
    if (isUsingLiveFeed) return;
    if (!uploadedImg.src) return;
    e.preventDefault();
    const pos = getCanvasCoords(e);
    cropRect.x = pos.x;
    cropRect.y = pos.y;
    isDragging = true;
}

function moveCrop(e) {
    if (!isDragging) return;
    e.preventDefault();
    if (!uploadedImg.src) return;
    const pos = getCanvasCoords(e);
    let side = Math.max(
        Math.abs(pos.x - cropRect.x),
        Math.abs(pos.y - cropRect.y)
    );
    cropRect.w = (pos.x < cropRect.x) ? -side : side;
    cropRect.h = (pos.y < cropRect.y) ? -side : side;

    ctxCrop.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
    ctxCrop.drawImage(uploadedImg, 0, 0);
    ctxCrop.strokeStyle = 'cyan';
    ctxCrop.lineWidth = 3;
    ctxCrop.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
}

function endCrop() {
    isDragging = false;
    if (!uploadedImg.src) return;
    if (Math.abs(cropRect.w) > 10 && Math.abs(cropRect.h) > 10) {
        setEmbBtn.disabled = false;
    } else {
        setEmbBtn.disabled = true;
    }
}

cropCanvas.addEventListener('mousedown', startCrop);
cropCanvas.addEventListener('mousemove', moveCrop);
cropCanvas.addEventListener('mouseup', endCrop);
cropCanvas.addEventListener('touchstart', startCrop, { passive: false });
cropCanvas.addEventListener('touchmove', moveCrop, { passive: false });
cropCanvas.addEventListener('touchend', endCrop);

// --- ENROLLMENT: Add current cropped face to gallery (embedding) ---
setEmbBtn.onclick = async () => {
    if (!uploadedImg.src) return;
    if (Math.abs(cropRect.w) < 10) return;
    setEmbBtn.disabled = true;
    
    // Wait for model to be loaded if not already
    if (!net) {
        if (modelLoadingPromise) {
            multiStatus.innerText = "Waiting for model to load...";
            await modelLoadingPromise;
        } else {
            await loadModelOnLaunch();
        }
    }
    
    const realX = cropRect.w < 0 ? cropRect.x + cropRect.w : cropRect.x;
    const realY = cropRect.h < 0 ? cropRect.y + cropRect.h : cropRect.y;
    const side = Math.abs(cropRect.w);
    if (side < 8) {
        setEmbBtn.disabled = false;
        return;
    }
    
    const thumbCanvas = document.createElement('canvas');
    thumbCanvas.width = 50;
    thumbCanvas.height = 50;
    const thumbCtxLocal = thumbCanvas.getContext('2d');
    thumbCtxLocal.drawImage(uploadedImg, realX, realY, side, side, 0, 0, 50, 50);
    const thumbDataUrl = thumbCanvas.toDataURL();
    
    offscreenCtx.clearRect(0, 0, INPUT_SIZE, INPUT_SIZE);
    offscreenCtx.drawImage(uploadedImg, realX, realY, side, side, 0, 0, INPUT_SIZE, INPUT_SIZE);
    const input = getInputTensor(offscreenCtx);
    
    setEmbBtn.textContent = "Computing...";
    const out = await net(input);
    const embedding = new Float32Array(out[0]);
    
    embeddings.push({
        emb: embedding,
        thumbDataUrl: thumbDataUrl,
        cropRectInfo: { x: realX, y: realY, side: side }
    });
    updateGallery();
    
    if (currentUploadedFileIndex < pendingFiles.length - 1) {
        currentUploadedFileIndex++;
        loadFileByIndex(currentUploadedFileIndex);
        multiStatus.innerText = `Enrolled! Next image ${currentUploadedFileIndex+1}/${pendingFiles.length}`;
        cropRect = { x: 0, y: 0, w: 0, h: 0 };
        setEmbBtn.disabled = true;
    } else if (currentUploadedFileIndex === pendingFiles.length - 1) {
        multiStatus.innerText = `Enrolled face from last image. Total enrolled: ${embeddings.length}. You can add more or start recognition.`;
        setEmbBtn.disabled = true;
        if (setupStream) {
            setupStream.getTracks().forEach(t => t.stop());
        }
        setupUI.style.display = 'none';
        const runStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = runStream;
        requestAnimationFrame(processFrame);
    } else {
        setEmbBtn.disabled = true;
        multiStatus.innerText = `Face enrolled. Total: ${embeddings.length}`;
    }
    setEmbBtn.textContent = "Add Face";
};

function updateGallery() {
    countSpan.innerText = embeddings.length;
    faceGalleryDiv.innerHTML = '';
    for (let idx = 0; idx < embeddings.length; idx++) {
        const item = embeddings[idx];
        const div = document.createElement('div');
        div.className = 'face-thumb';
        const canvas = document.createElement('canvas');
        canvas.width = 45;
        canvas.height = 45;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
            ctx.drawImage(img, 0, 0, 45, 45);
        };
        img.src = item.thumbDataUrl;
        const span = document.createElement('span');
        span.innerText = `#${idx+1}`;
        const percentSpan = document.createElement('span');
        percentSpan.className = 'sim-percent';
        percentSpan.innerText = '--%';
        percentSpan.style.fontSize = '10px';
        percentSpan.style.display = 'block';
        percentSpan.style.fontWeight = 'bold';
        percentSpan.style.marginTop = '2px';
        const removeBtn = document.createElement('button');
        removeBtn.innerText = '✖';
        removeBtn.className = 'remove-btn';
        removeBtn.onclick = (e) => {
            e.stopPropagation();
            embeddings.splice(idx, 1);
            updateGallery();
            if (embeddings.length === 0 && setupUI.style.display === 'none') {
                // re-show setup UI if needed
            }
        };
        div.appendChild(canvas);
        div.appendChild(span);
        div.appendChild(percentSpan);
        div.appendChild(removeBtn);
        faceGalleryDiv.appendChild(div);
    }
}

// --- LIVE RECOGNITION ---
async function processFrame() {
    if (!video.videoWidth || video.videoWidth === 0) {
        requestAnimationFrame(processFrame);
        return;
    }
    if (!net || embeddings.length === 0) {
        overlay.width = video.clientWidth;
        overlay.height = video.clientHeight;
        overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
        overlayCtx.font = "16px monospace";
        overlayCtx.fillStyle = "yellow";
        overlayCtx.shadowBlur = 0;
        overlayCtx.fillText("No Faces. Add faces via upload.", 20, 40);
        requestAnimationFrame(processFrame);
        return;
    }
    
    overlay.width = video.clientWidth;
    overlay.height = video.clientHeight;
    overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
    
    const squareSize = Math.min(overlay.width, overlay.height) * 0.5;
    const squareX = (overlay.width - squareSize) / 2;
    const squareY = (overlay.height - squareSize) / 2;
    overlayCtx.strokeStyle = 'cyan';
    overlayCtx.lineWidth = 2;
    overlayCtx.strokeRect(squareX, squareY, squareSize, squareSize);
    
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const cropSize = Math.min(vw, vh) * 0.5;
    const sx = (vw - cropSize) / 2;
    const sy = (vh - cropSize) / 2;
    
    offscreenCtx.drawImage(video, sx, sy, cropSize, cropSize, 0, 0, INPUT_SIZE, INPUT_SIZE);
    const input = getInputTensor(offscreenCtx);
    const out = await net(input);
    const queryEmb = out[0];
    
    const similarities = [];
    for (let i = 0; i < embeddings.length; i++) {
        let sim = 0;
        const faceEmb = embeddings[i].emb;
        for (let j = 0; j < queryEmb.length; j++) sim += faceEmb[j] * queryEmb[j];
        similarities.push(sim);
    }
    
    let bestSim = -1;
    let bestIdx = 0;
    for (let i = 0; i < similarities.length; i++) {
        if (similarities[i] > bestSim) {
            bestSim = similarities[i];
            bestIdx = i;
        }
    }
    if (bestSim < 0) bestSim = 0;
    const bestPercent = Math.min(99, Math.round(bestSim * 100));
    
    // Update each thumbnail in gallery with its similarity percentage
    const galleryItems = document.querySelectorAll('.face-thumb');
    for (let i = 0; i < galleryItems.length && i < similarities.length; i++) {
        const sim = similarities[i];
        const percent = Math.min(99, Math.max(0, Math.round(sim * 100)));
        let percentSpan = galleryItems[i].querySelector('.sim-percent');
        if (!percentSpan) {
            percentSpan = document.createElement('span');
            percentSpan.className = 'sim-percent';
            percentSpan.style.fontSize = '10px';
            percentSpan.style.display = 'block';
            percentSpan.style.fontWeight = 'bold';
            percentSpan.style.marginTop = '2px';
            const removeBtn = galleryItems[i].querySelector('.remove-btn');
            galleryItems[i].insertBefore(percentSpan, removeBtn);
        }
        percentSpan.innerText = `${percent}%`;
        percentSpan.style.color = sim > 0.45 ? '#0f0' : (sim > 0.3 ? '#fa0' : '#f44');
    }
    
    outputEl.innerHTML = `Best match: ${bestPercent}% (${embeddings.length} faces)`;
    outputEl.style.color = bestSim > 0.45 ? 'lime' : (bestSim > 0.3 ? '#ffaa44' : '#ff4444');
    

    if (bestSim > 0.2 && embeddings.length > 0) {
        const bestThumb = new Image();
        bestThumb.src = embeddings[bestIdx].thumbDataUrl;
        thumbCtx.drawImage(bestThumb, 0, 0, 60, 60);
    } else {
        thumbCtx.fillStyle = "#222";
        thumbCtx.fillRect(0,0,60,60);
        thumbCtx.fillStyle = "gray";
        thumbCtx.font = "10px monospace";
        thumbCtx.fillText("?", 25, 30);
    }
    
    requestAnimationFrame(processFrame);
}

clearBtn.onclick = () => {
    embeddings = [];
    updateGallery();
    multiStatus.innerText = "All Faces cleared. You can upload images again.";
    if (setupUI.style.display === 'none') {
        outputEl.innerHTML = "No Faces. Please add faces.";
    }
    thumbCtx.fillStyle = "#111";
    thumbCtx.fillRect(0,0,60,60);
};

function getInputTensor(ctx) {
    const imgData = ctx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
    const pixels = imgData.data;
    const input = new Float32Array(INPUT_SIZE * INPUT_SIZE * 3);
    let j = 0;
    for (let i = 0; i < pixels.length; i += 4) {
        input[j++] = pixels[i + 2];
        input[j++] = pixels[i + 1];
        input[j++] = pixels[i];
    }
    return input;
}

async function getDevice() {
    const adapter = await navigator.gpu.requestAdapter();
    return await adapter.requestDevice();
}

window.loadNextManually = function() {
    if (currentUploadedFileIndex + 1 < pendingFiles.length) {
        currentUploadedFileIndex++;
        loadFileByIndex(currentUploadedFileIndex);
    }
};
</script>
</body>
</html>
