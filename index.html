<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdaFace WebGPU</title>
    <script type="module">
        import ADAFACE from "./net.js";
        window.ADAFACE = ADAFACE;
    </script>
    <style>
        body {
            margin: 0;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
            height: 100vh;
            position: relative;
            overflow: hidden;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #video, #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scaleX(-1);
            max-width: 100vw;
            max-height: 100vh;
        }
        #overlay { pointer-events: none; }
        #outputContainer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid lime;
            color: lime;
            font-family: monospace;
            padding: 10px;
            font-size: 14px;
            z-index: 5;
        }
        #setupUI {
            position: absolute;
            z-index: 100;
            background: #111;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding-top: 10px;
        }
        .controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        #cropCanvas {
            border: 2px solid #444;
            cursor: crosshair;
            background: #000;
            max-width: 90vw;
            max-height: 60vh;
            touch-action: none;
        }
        button {
            padding: 6px 10px;
            font-size: 12px;
            background: #333;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover { background: #444; }
        #snapBtn { background: #552200; border-color: #aa4400; }
        #setEmbBtn {
            background: #004400;
            border-color: lime;
            color: lime;
            font-weight: bold;
        }
        #setEmbBtn:disabled { opacity: 0.3; cursor: not-allowed; }
        input[type="file"] {
            font-size: 11px;
            color: #888;
            max-width: 120px;
        }
    </style>
</head>
<body>

<div id="setupUI">
    <h3 style="margin:4px 0;">AdaFace tinygrad</h3>

    <canvas id="cropCanvas"></canvas>

    <div class="controls">
        <button id="snapBtn">Capture</button>
        <input type="file" id="fileInput" accept="image/*">
        <button id="setEmbBtn" disabled>Use</button>
    </div>

    <p id="cropInst" style="display:none; font-size: 11px; color: #0f0;">
        Drag square over face
    </p>
</div>

<video id="video" autoplay muted playsinline></video>
<canvas id="overlay"></canvas>

<div id="outputContainer">
    <div id="output"></div>
</div>

<script>
const INPUT_SIZE = 112;
let net = null;
let dynamicEmb = null;
let setupStream = null;
let isDragging = false;
let isUsingLiveFeed = true;
let uploadedImg = new Image();
let cropRect = { x: 0, y: 0, w: 0, h: 0 };

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const overlayCtx = overlay.getContext('2d');
const outputEl = document.getElementById('output');
const setupUI = document.getElementById('setupUI');
const cropCanvas = document.getElementById('cropCanvas');
const ctxCrop = cropCanvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const setEmbBtn = document.getElementById('setEmbBtn');
const snapBtn = document.getElementById('snapBtn');

const offscreenCanvas = document.createElement('canvas');
offscreenCanvas.width = INPUT_SIZE;
offscreenCanvas.height = INPUT_SIZE;
const offscreenCtx = offscreenCanvas.getContext('2d');

// --- INIT ---
window.onload = async () => {
    try {
        setupStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = setupStream;
        outputEl.textContent = "Camera Ready. Select face area.";
        startPreviewLoop();
    } catch (e) {
        outputEl.textContent = "Error: Camera access denied.";
        alert("Please allow camera access.");
    }
};

function startPreviewLoop() {
    const preview = () => {
        if (!isUsingLiveFeed) return;
        if (video.videoWidth > 0) {
            cropCanvas.width = video.videoWidth;
            cropCanvas.height = video.videoHeight;
            ctxCrop.save();
            ctxCrop.scale(-1, 1);
            ctxCrop.drawImage(video, -cropCanvas.width, 0);
            ctxCrop.restore();
        }
        requestAnimationFrame(preview);
    };
    preview();
}

// --- SNAP / UPLOAD ---
snapBtn.onclick = () => {
    document.getElementById('cropInst').style.display = 'block';
    isUsingLiveFeed = false;
    uploadedImg.src = cropCanvas.toDataURL('image/jpeg');
    uploadedImg.onload = () => {
        ctxCrop.drawImage(uploadedImg, 0, 0);
    };
};

fileInput.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    isUsingLiveFeed = false;
    document.getElementById('cropInst').style.display = 'block';

    const reader = new FileReader();
    reader.onload = event => {
        uploadedImg.onload = () => {
            cropCanvas.width = uploadedImg.width;
            cropCanvas.height = uploadedImg.height;
            ctxCrop.drawImage(uploadedImg, 0, 0);
        };
        uploadedImg.src = event.target.result;
    };
    reader.readAsDataURL(file);
};

// --- MOBILE + MOUSE CROP ---
function getCanvasCoords(e) {
    const rect = cropCanvas.getBoundingClientRect();
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;

    return {
        x: (clientX - rect.left) * (cropCanvas.width / rect.width),
        y: (clientY - rect.top) * (cropCanvas.height / rect.height)
    };
}

function startCrop(e) {
    if (isUsingLiveFeed) return;
    e.preventDefault();
    const pos = getCanvasCoords(e);
    cropRect.x = pos.x;
    cropRect.y = pos.y;
    isDragging = true;
}

function moveCrop(e) {
    if (!isDragging) return;
    e.preventDefault();

    const pos = getCanvasCoords(e);

    let side = Math.max(
        Math.abs(pos.x - cropRect.x),
        Math.abs(pos.y - cropRect.y)
    );

    cropRect.w = (pos.x < cropRect.x) ? -side : side;
    cropRect.h = (pos.y < cropRect.y) ? -side : side;

    ctxCrop.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
    ctxCrop.drawImage(uploadedImg, 0, 0);

    ctxCrop.strokeStyle = 'cyan';
    ctxCrop.lineWidth = 3;
    ctxCrop.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
}

function endCrop() {
    isDragging = false;
    if (Math.abs(cropRect.w) > 10) setEmbBtn.disabled = false;
}

cropCanvas.addEventListener('mousedown', startCrop);
cropCanvas.addEventListener('mousemove', moveCrop);
cropCanvas.addEventListener('mouseup', endCrop);

cropCanvas.addEventListener('touchstart', startCrop, { passive: false });
cropCanvas.addEventListener('touchmove', moveCrop, { passive: false });
cropCanvas.addEventListener('touchend', endCrop);

// --- EMBEDDING ---
setEmbBtn.onclick = async () => {
    setEmbBtn.disabled = true;

    const realX = cropRect.w < 0 ? cropRect.x + cropRect.w : cropRect.x;
    const realY = cropRect.h < 0 ? cropRect.y + cropRect.h : cropRect.y;
    const side = Math.abs(cropRect.w);

    offscreenCtx.drawImage(uploadedImg, realX, realY, side, side, 0, 0, INPUT_SIZE, INPUT_SIZE);

    const url = "https://huggingface.co/roryclear/AdaFace/resolve/main/adaface_ir50_ms1mv2.safetensors";
    const res = await fetch(url);

    const contentLength = res.headers.get("Content-Length");
    const total = contentLength ? parseInt(contentLength, 10) : 0;

    const reader = res.body.getReader();
    let received = 0;
    const chunks = [];

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        chunks.push(value);
        received += value.length;

        if (total) {
            const percent = Math.round((received / total) * 100);
            setEmbBtn.textContent = `Loading ${percent}%`;
        } else {
            setEmbBtn.textContent = `Loading ${Math.round(received / 1024)} KB`;
        }
    }

    const blob = new Blob(chunks);
    const blobUrl = URL.createObjectURL(blob);

    const device = await getDevice();
    net = await ADAFACE.load(device, blobUrl);

    URL.revokeObjectURL(blobUrl);

    setEmbBtn.textContent = "Processing...";

    const input = getInputTensor(offscreenCtx);
    const out = await net(input);
    dynamicEmb = out[0];

    if (setupStream) setupStream.getTracks().forEach(t => t.stop());
    setupUI.style.display = 'none';

    const runStream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = runStream;
    requestAnimationFrame(processFrame);
};

async function processFrame() {
    if (video.videoWidth === 0) return requestAnimationFrame(processFrame);

    overlay.width = video.clientWidth;
    overlay.height = video.clientHeight;
    overlayCtx.clearRect(0, 0, overlay.width, overlay.height);

    const squareSize = Math.min(overlay.width, overlay.height) * 0.5;
    const squareX = (overlay.width - squareSize) / 2;
    const squareY = (overlay.height - squareSize) / 2;
    overlayCtx.strokeStyle = 'cyan';
    overlayCtx.strokeRect(squareX, squareY, squareSize, squareSize);

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const cropSize = Math.min(vw, vh) * 0.5;
    const sx = (vw - cropSize) / 2;
    const sy = (vh - cropSize) / 2;

    offscreenCtx.drawImage(video, sx, sy, cropSize, cropSize, 0, 0, INPUT_SIZE, INPUT_SIZE);

    const input = getInputTensor(offscreenCtx);
    const out = await net(input);
    
    let sim = 0;
    for (let i = 0; i < dynamicEmb.length; i++) sim += dynamicEmb[i] * out[0][i];

    outputEl.textContent = `Similarity: ${Math.round(sim.toFixed(4) * 100)}%`;
    outputEl.style.color = sim > 0.4 ? 'lime' : '#ff4444';

    requestAnimationFrame(processFrame);
}

function getInputTensor(ctx) {
    const imgData = ctx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
    const pixels = imgData.data;
    const input = new Float32Array(INPUT_SIZE * INPUT_SIZE * 3);
    let j = 0;
    for (let i = 0; i < pixels.length; i += 4) {
        input[j++] = pixels[i + 2];
        input[j++] = pixels[i + 1];
        input[j++] = pixels[i];
    }
    return input;
}

async function getDevice() {
    const adapter = await navigator.gpu.requestAdapter();
    return await adapter.requestDevice();
}
</script>
</body>
</html>
